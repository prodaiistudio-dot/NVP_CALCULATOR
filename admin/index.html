<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — CMS</title>
  <link rel="stylesheet" href="admin.css"/>
</head>
<body>

<!-- ── Login ─────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    </div>
    <h1>CMS Admin</h1>
    <p class="login-sub">Aqua Design Studio</p>
    <form id="login-form">
      <input type="password" id="login-pass" placeholder="Password" autocomplete="current-password"/>
      <button type="submit" class="btn btn-primary btn-block">Sign in</button>
    </form>
    <div id="login-error" class="login-error hidden">Wrong password</div>
  </div>
</div>

<!-- ── Admin shell ────────────────────────────────────────── -->
<div id="admin-shell" class="hidden">

  <header id="admin-header">
    <div class="hd-left">
      <button id="sidebar-toggle" class="icon-btn" title="Toggle sidebar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="hd-logo">CMS</span>
      <span id="draft-badge" class="badge-draft hidden">● Draft pending</span>
    </div>
    <div class="hd-right">
      <button id="btn-preview"  class="btn btn-ghost">Preview ↗</button>
      <button id="btn-discard"  class="btn btn-ghost  hidden">Discard draft</button>
      <button id="btn-publish"  class="btn btn-primary hidden">Publish</button>
      <button id="btn-logout"   class="btn btn-ghost">Logout</button>
    </div>
  </header>

  <div id="admin-body">

    <nav id="admin-sidebar">
      <ul>
        <li class="nav-item active" data-section="products">
          <span class="nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
          </span>
          <span class="nav-label">Products</span>
        </li>
        <li class="nav-item" data-section="media">
          <span class="nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </span>
          <span class="nav-label">Media</span>
        </li>
        <li class="nav-item" data-section="company">
          <span class="nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
          </span>
          <span class="nav-label">Company</span>
        </li>
        <li class="nav-item" data-section="scenesetup">
          <span class="nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          </span>
          <span class="nav-label">3D Space</span>
        </li>
        <li class="nav-item" data-section="c3dsettings">
          <span class="nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          </span>
          <span class="nav-label">3D Settings</span>
        </li>
      </ul>
    </nav>

    <main id="admin-content">
      <div class="loading-spinner">Loading…</div>
    </main>

  </div>

</div>

<!-- ── Toasts ─────────────────────────────────────────────── -->
<div id="toast-wrap"></div>

<!-- ── Confirm dialog ────────────────────────────────────── -->
<div id="confirm-overlay" class="hidden">
  <div class="confirm-card">
    <p id="confirm-msg"></p>
    <div class="confirm-btns">
      <button id="confirm-ok"  class="btn btn-primary">Confirm</button>
      <button id="confirm-no"  class="btn btn-ghost">Cancel</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.124.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.124.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.124.0/examples/js/loaders/RGBELoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.124.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.124.0/examples/js/controls/TransformControls.js"></script>
<script src="scene-editor.js"></script>
<script src="admin.js"></script>
</body>
</html>
